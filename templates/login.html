{% extends "base.html" %}
{% block title %}Login — HabitFlow{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">HabitFlow</div>
    <p class="auth-sub">Track habits. Build streaks. Earn points.</p>
    <form method="POST" class="auth-form">
      <div class="fg">
        <label>Username</label>
        <input type="text" name="username" placeholder="Your username" required/>
      </div>
      <div class="fg">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required/>
      </div>
      <button type="submit" class="btn-primary full">Login</button>
    </form>
    <p class="auth-switch">No account? <a href="{{ url_for('register') }}">Register here</a></p>
  </div>
</div>
{% endblock %}
